# Weather Particle System Configuration
# GPU-accelerated weather effects using bevy_hanabi

rain:
  enabled: true
  # Particles spawned per second (affects density)
  intensity: 5000.0
  # Fall speed in meters per second
  drop_speed: 15.0
  # Visual length of raindrop streaks
  drop_length: 0.3
  # How much wind affects rain direction (0-1)
  wind_influence: 0.5
  # Spawn splash particles on impact
  splash_enabled: true
  # Color (RGBA, 0-1)
  color: [0.7, 0.8, 0.9, 0.6]

snow:
  enabled: true
  # Particles per second
  intensity: 2000.0
  # Slower fall for snow
  fall_speed: 2.0
  # Snowflake particle size
  flake_size: 0.02
  # Snow is heavily affected by wind
  wind_influence: 0.8
  # Enable snow accumulation (future feature)
  accumulation: false
  # White with slight blue tint
  color: [1.0, 1.0, 1.0, 0.9]

dust:
  enabled: true
  # Lower intensity for dust
  intensity: 500.0
  # Small particles
  particle_size: 0.0015
  # Dust moves with wind
  wind_influence: 1.0
  # Sandy/earthy color
  color: [0.88, 0.78, 0.46, 0.35]

# Global wind settings
wind:
  # Default wind direction (normalized x, z)
  direction: [0.7, 0.3]
  # Base wind speed (m/s)
  speed: 5.0
  # Wind turbulence (randomness)
  turbulence: 0.3
  # Wind gust frequency
  gust_frequency: 0.1
  # Wind gust strength multiplier
  gust_strength: 2.0

# Quality presets
quality_presets:
  low:
    rain:
      intensity: 2000.0
      splash_enabled: false
    snow:
      intensity: 1000.0
    dust:
      intensity: 200.0
  
  medium:
    rain:
      intensity: 4000.0
      splash_enabled: false
    snow:
      intensity: 1500.0
    dust:
      intensity: 400.0
  
  high:
    rain:
      intensity: 5000.0
      splash_enabled: true
    snow:
      intensity: 2000.0
    dust:
      intensity: 500.0
  
  ultra:
    rain:
      intensity: 8000.0
      splash_enabled: true
    snow:
      intensity: 3000.0
    dust:
      intensity: 800.0
