# Enhanced Water Rendering Configuration
# Gerstner waves, foam, and caustics

gerstner:
  enabled: true
  # Base wave height (meters)
  amplitude: 0.9
  # Scale of wave patterns (larger = longer wavelengths)
  wave_scale: 0.85
  # Wave animation speed multiplier
  wave_speed: 1.3
  # Number of wave layers (1-4, more = better quality but slower)
  wave_count: 4

foam:
  enabled: true
  # Foam color (RGB, 0-1)
  color: [1.0, 1.0, 1.0]
  # Foam brightness multiplier
  intensity: 1.3
  # Foam texture scale
  scale: 1.2
  # How long foam persists (0-1)
  persistence: 0.9
  # Generate foam at shorelines
  shore_foam: true
  # Generate foam at wave crests
  wave_crest_foam: true

caustics:
  enabled: true
  # Caustic light intensity
  intensity: 0.85
  # Caustic pattern scale
  scale: 1.2
  # Animation speed
  speed: 1.0
  # Maximum depth for caustic visibility (meters)
  max_depth: 10.0

visual:
  # Deep water color (RGBA)
  deep_color: [0.01, 0.04, 0.12, 0.98]
  # Shallow water color (RGBA)
  shallow_color: [0.04, 0.18, 0.36, 0.9]
  # Water clarity (0 = murky, 1 = crystal clear)
  clarity: 0.14
  # Surface reflectivity (0-1)
  reflectivity: 0.88
  # Fresnel effect power (higher = more edge reflection)
  fresnel_power: 5.6

detail_normals:
  enabled: true
  # UV scale for primary ripple normal map
  scale_a: 0.3
  # UV scale for secondary ripple normal map
  scale_b: 0.17
  # Normal map influence strength (0-1)
  intensity: 0.8
  # Scroll speed for animated ripples
  scroll_speed: 0.04

reflections:
  enabled: true
  # Render resolution as fraction of main camera (0.35 = ~672x378)
  resolution_scale: 0.35
  # Disable shadows in reflection camera for performance
  disable_shadows: true
  # Max distance for reflection camera rendering
  max_render_distance: 150.0
  # How much wave normals distort the reflection image
  distortion_strength: 0.02
  # Render reflection every N frames (2 = every other frame)
  update_every_n_frames: 2

refraction:
  enabled: true
  # UV offset strength for underwater distortion
  strength: 0.03
  # Index of refraction for water
  ior: 1.33
  # Separate R/G/B channels for rainbow edge effect
  chromatic_aberration: false

displacement:
  enabled: true
  # Compute shader texture resolution (NxN pixels)
  resolution: 1024
  # World area covered by the displacement texture (meters)
  world_size: 128.0
  # Wave propagation speed factor
  wave_speed: 0.98
  # Energy damping per frame (0.99 = slow decay)
  damping: 0.995
  # Radius of player water interaction impulse
  player_impulse_radius: 1.5
  # Strength of player water interaction
  player_impulse_strength: -0.3

# Quality presets
quality_presets:
  low:
    gerstner:
      wave_count: 2
    foam:
      enabled: false
    caustics:
      enabled: false
  
  medium:
    gerstner:
      wave_count: 3
    foam:
      enabled: true
      shore_foam: true
      wave_crest_foam: false
    caustics:
      enabled: true
      intensity: 0.3
  
  high:
    gerstner:
      wave_count: 4
    foam:
      enabled: true
    caustics:
      enabled: true
  
  ultra:
    gerstner:
      wave_count: 4
      amplitude: 0.6
    foam:
      enabled: true
      intensity: 1.2
    caustics:
      enabled: true
      intensity: 0.7
